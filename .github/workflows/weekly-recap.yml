name: Weekly Hockey Recap

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD) — defaults to last Monday'
        required: false
      end_date:
        description: 'End date (YYYY-MM-DD) — defaults to last Sunday'
        required: false

jobs:
  generate-recap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Install system fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fonts-open-sans

      - name: Generate recap card
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            node src/index.js "${{ github.event.inputs.start_date }}" "${{ github.event.inputs.end_date }}"
          else
            node src/index.js
          fi

      - name: Commit and push PNG output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.png
          git diff --staged --quiet || git commit -m "chore: weekly recap card $(date +%Y-%m-%d)"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-recap-cards
          path: output/*.png
          retention-days: 30
