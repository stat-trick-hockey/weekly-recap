<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NHL Injury Report</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --deep:#0a0f1e; --slate:#94a3b8; --accent:#3b82f6;
    --gold:#d4a847; --red:#c41230; --green:#4ade80;
  }
  body { background:var(--deep); width:1080px; height:1350px; overflow:hidden; font-family:'DM Sans',sans-serif; }
  .card {
    width:1080px; height:1350px;
    background:var(--deep);
    position:relative; overflow:hidden;
    display:flex; flex-direction:column;
  }
  .card::before {
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(ellipse 90% 35% at 50% -5%, rgba(196,18,48,0.12) 0%, transparent 65%),
      radial-gradient(ellipse 50% 25% at 90% 105%, rgba(59,130,246,0.07) 0%, transparent 55%);
    pointer-events:none; z-index:0;
  }
  .grid-bg {
    position:absolute; inset:0;
    background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
    background-size:54px 54px; z-index:0;
  }
  .rink-top    { position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--red) 0%,var(--red) 33%,white 33%,white 66%,var(--red) 66%);z-index:10; }
  .rink-bottom { position:absolute;bottom:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#1a3a6b 0%,#1a3a6b 33%,white 33%,white 66%,#1a3a6b 66%);z-index:10; }

  /* Header */
  .header { position:relative;z-index:5;padding:20px 52px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0; }
  .eyebrow { font-family:'DM Mono',monospace;font-size:14px;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:6px; }
  .title   { font-family:'Bebas Neue',sans-serif;font-size:88px;line-height:0.95;color:white;letter-spacing:0.02em; }
  .title span { color:#f87171; }
  .header-right { text-align:right; }
  .week-label  { font-family:'DM Mono',monospace;font-size:14px;letter-spacing:0.12em;color:var(--slate);text-transform:uppercase;margin-bottom:6px; }
  .total-count { font-family:'Bebas Neue',sans-serif;font-size:80px;color:#f87171;line-height:1; }
  .total-label { font-family:'DM Mono',monospace;font-size:13px;letter-spacing:0.18em;color:var(--slate);text-transform:uppercase; }

  .hdivider { position:relative;z-index:5;margin:0 52px;height:1px;background:linear-gradient(90deg,#f87171,rgba(248,113,113,0.1));flex-shrink:0; }

  /* Summary row */
  .summary-row {
    position:relative;z-index:5;
    padding:12px 52px;
    display:flex; gap:0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    flex-shrink:0;
  }
  .summary-stat { flex:1;text-align:center;border-right:1px solid rgba(255,255,255,0.07); }
  .summary-stat:last-child { border-right:none; }
  .summary-val  { font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;display:block; }
  .summary-lbl  { font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.16em;color:var(--slate);text-transform:uppercase;margin-top:2px;display:block; }

  /* Section label */
  .section-label {
    font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.2em;
    color:var(--accent);text-transform:uppercase;margin-bottom:10px;
    display:flex;align-items:center;gap:10px;
  }
  .section-label::after { content:'';flex:1;height:1px;background:rgba(59,130,246,0.25); }

  /* Player list */
  .players-section {
    position:relative;z-index:5;
    padding:14px 52px;
    flex:1;
    overflow:hidden;
  }
  .players-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 24px;
  }
  .player-row {
    display:flex; align-items:center; gap:10px;
    padding:8px 12px;
    background:rgba(255,255,255,0.025);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:5px;
    min-width:0;
  }
  .team-badge {
    font-family:'Bebas Neue',sans-serif;
    font-size:13px;letter-spacing:0.05em;
    color:white;
    width:42px;height:24px;
    display:inline-flex;align-items:center;justify-content:center;
    border-radius:4px;
    flex-shrink:0;
    border:1px solid rgba(255,255,255,0.15);
    text-shadow:0 1px 2px rgba(0,0,0,0.5);
  }
  .player-name {
    font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
    color:white;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .player-status {
    font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;
    text-transform:uppercase;padding:2px 7px;border-radius:3px;flex-shrink:0;
  }
  .status-out  { background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3); }
  .status-ir   { background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.25); }
  .status-dtd  { background:rgba(148,163,184,0.12);color:#94a3b8;border:1px solid rgba(148,163,184,0.2); }
  .status-other{ background:rgba(59,130,246,0.1);color:#93c5fd;border:1px solid rgba(59,130,246,0.2); }
  .player-type {
    font-family:'DM Mono',monospace;font-size:10px;
    color:rgba(255,255,255,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;flex-shrink:0;
  }

  /* Footer */
  .footer {
    position:relative;z-index:5;
    padding:10px 52px;
    display:flex;justify-content:space-between;align-items:center;
    flex-shrink:0;
    border-top:1px solid rgba(255,255,255,0.05);
  }
  .footer-brand { font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.1em;color:rgba(255,255,255,0.2); }
  .footer-brand span { color:var(--accent); }
  .footer-tag   { font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.1em;color:rgba(255,255,255,0.12); }
</style>
</head>
<body>
<div class="card">
  <div class="rink-top"></div>
  <div class="rink-bottom"></div>
  <div class="grid-bg"></div>

  <div class="header">
    <div>
      <div class="eyebrow">NHL · Injury Report</div>
      <div class="title">INJURY <span>REPORT</span></div>
    </div>
    <div class="header-right">
      <div class="week-label">{{WEEK_LABEL}}</div>
      <div class="total-count">{{TOTAL_INJURED}}</div>
      <div class="total-label">Players Out</div>
    </div>
  </div>

  <div class="hdivider"></div>

  <div class="summary-row">
    <div class="summary-stat">
      <span class="summary-val" style="color:#f87171">{{OUT_COUNT}}</span>
      <span class="summary-lbl">Out</span>
    </div>
    <div class="summary-stat">
      <span class="summary-val" style="color:#fbbf24">{{IR_COUNT}}</span>
      <span class="summary-lbl">Injured Reserve</span>
    </div>
    <div class="summary-stat">
      <span class="summary-val" style="color:#94a3b8">{{DTD_COUNT}}</span>
      <span class="summary-lbl">Day-To-Day</span>
    </div>
  </div>

  <div class="players-section">
    <div class="section-label">All Injured Players</div>
    <div class="players-grid">
      {{PLAYERS_HTML}}
    </div>
  </div>

  <div class="footer">
    <div class="footer-brand"><span>STAT</span>TRICK · HOCKEY</div>
    <div class="footer-tag">@stattrick_hockey · Data via ESPN</div>
  </div>
</div>
</body>
</html>
